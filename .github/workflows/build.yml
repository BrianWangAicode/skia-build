on:
  workflow_dispatch:
    inputs:
      skip_release:
        description: 'Skip release related steps? (true/false)'
        required: true
        default: 'false'

env:
  version: m147-4502f88af90

jobs:
  linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        build_type: [Release]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y python3
      - run: sudo ./script/prepare_linux.sh
      - run: python3 script/checkout.py --version ${{ env.version }}
      - run: python3 script/build.py --build-type ${{ matrix.build_type }}
      - run: python3 script/archive.py --version ${{ env.version }} --build-type ${{ matrix.build_type }}
      - uses: actions/upload-artifact@v4
        with:
          name: Skia-${{ env.version }}-linux-${{ matrix.build_type }}-x64
          path: skia/out/Release-x64/

  windows:
    runs-on: windows-2022
    strategy:
      matrix:
        build_type: [Release]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: egor-tensin/vs-shell@v2
      - shell: bash
        run: python3 script/checkout.py --version ${{ env.version }}
      - shell: bash
        run: python3 script/build.py --build-type ${{ matrix.build_type }}
      - shell: bash
        run: python3 script/archive.py --version ${{ env.version }} --build-type ${{ matrix.build_type }}
      - uses: actions/upload-artifact@v4
        with:
          name: Skia-${{ env.version }}-windows-${{ matrix.build_type }}-x64
          path: skia/out/Release-x64/
